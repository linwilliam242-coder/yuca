<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>语擦类型测试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
body{background:#f7f8fa;color:#333;line-height:1.6}
.container{max-width:700px;margin:50px auto;padding:0 20px}
.box{background:#fff;border-radius:16px;padding:30px 26px;box-shadow:0 2px 12px rgba(0,0,0,0.07)}
.title{font-size:24px;font-weight:600;margin-bottom:10px}
.desc{color:#666;margin-bottom:24px}
.question{font-size:18px;margin-bottom:18px}
.option{display:block;width:100%;padding:14px 18px;background:#f7f8fa;border:none;border-radius:12px;text-align:left;margin-bottom:10px;cursor:pointer;font-size:16px}
.option:hover{background:#eef2ff}
.option.selected{background:#007aff;color:#fff}
.btn{padding:12px 28px;background:#007aff;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;margin-top:12px}
.btn:disabled{background:#ccc}
.progress{color:#888;font-size:14px;margin-bottom:12px}
.result-box .type{font-size:22px;color:#007aff;font-weight:bold;margin:12px 0}
.result-box .info{color:#555}
.hide{display:none}
</style>
</head>
<body>

<div class="container">
  <div class="box" id="pageStart">
    <div class="title">语擦类型测试</div>
    <div class="desc">25题，可多选最多2项，测出最适合你的语擦世界观</div>
    <button class="btn" onclick="start()">开始测试</button>
  </div>

  <div class="box hide" id="pageQuiz">
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="btn hide" id="nextBtn" onclick="next()">下一题</button>
  </div>

  <div class="box hide result-box" id="pageResult">
    <div class="title">你的专属语擦类型</div>
    <div class="type" id="typeName"></div>
    <div class="info" id="typeDesc"></div>
    <button class="btn" onclick="restart()">重新测试</button>
  </div>
</div>

const typeInfo = {
  古玄:"古风玄幻，修仙、仙门、妖魔、灵力与宿命，氛围感极强",
  古原:"古风原创，江湖朝堂、世家权谋，无玄幻，重剧情与人设",
  现玄:"现代玄幻，都市异能、妖怪、灵异，日常与超自然结合",
  现原:"现代原创，贴近现实生活，细腻日常、情感拉扯",
  星际:"星际宇宙，机甲、帝国、星盗、异能，强强热血向",
  西幻:"西方奇幻，魔法、骑士、精灵、龙族，史诗感拉满",
  校园:"青春校园，青涩暗恋、成长日常，轻松治愈",
  民国:"民国背景，谍战、军阀、文人商贾，氛围感拉满",
  末世:"末世废土，生存、人性、异能，紧张刺激",
  赛博未来:"赛博朋克，科技、义体、霓虹都市，风格前卫",
  灵异怪谈:"规则怪谈、灵异解谜，悬疑诡异，细思极恐",
  妖和精怪:"妖界精怪日常，温柔治愈或虐心宿命均可"
};

let current = 0;
let selected = [];
let score = {};

function resetScore(){
  for(let k in typeInfo) score[k] = 0;
}

function show(id){
  document.getElementById("pageStart").classList.add("hide");
  document.getElementById("pageQuiz").classList.add("hide");
  document.getElementById("pageResult").classList.add("hide");
  document.getElementById(id).classList.remove("hide");
}

function start(){
  resetScore();
  current = 0;
  selected = [];
  show("pageQuiz");
  render();
}

function render(){
  let q = questions[current];
  document.getElementById("progress").innerText = `第 ${current+1}/25 题`;
  document.getElementById("question").innerText = q.q;
  let box = document.getElementById("options");
  box.innerHTML = "";
  selected = [];
  q.o.forEach(o=>{
    let btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = o.t + "｜" + o.txt;
    btn.dataset.type = o.t;
    btn.onclick = function(){
      if(this.classList.contains("selected")){
        this.classList.remove("selected");
        selected = selected.filter(s=>s.t!==o.t);
      }else{
        if(selected.length >= 2) return;
        this.classList.add("selected");
        selected.push(o);
      }
      document.getElementById("nextBtn").classList.remove("hide");
    };
    box.appendChild(btn);
  });
  document.getElementById("nextBtn").classList.add("hide");
}

function next(){
  selected.forEach(o=>{
    o.v.forEach(t=>{
      if(score[t]!==undefined) score[t]++;
    });
  });
  current++;
  if(current >= questions.length){
    showResult();
  }else{
    render();
  }
}

function showResult(){
  let maxType = Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);
  document.getElementById("typeName").innerText = maxType;
  document.getElementById("typeDesc").innerText = typeInfo[maxType];
  show("pageResult");
}

function restart(){
  show("pageStart");
}

resetScore();
</script>
</body>
</html>
